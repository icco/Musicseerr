name: Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: make test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (make)
        run: make frontend-install

      - name: Install Playwright Chromium (make)
        run: make frontend-browser-install

      - name: Install Playwright system dependencies (Linux CI)
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Run backend and frontend tests (make)
        run: make test
